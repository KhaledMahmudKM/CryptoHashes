<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ic" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2ee6a6"/>
      <stop offset="100%" stop-color="#57b6ff"/>
    </linearGradient>
  </defs>
  <!-- rounded panel -->
  <rect width="512" height="512" rx="112" fill="#0d1117"/>
  <rect x="8" y="8" width="496" height="496" rx="106" fill="none" stroke="#2b3441" stroke-width="4"/>
  <!-- terminal prompt: >_ with a hash -->
  <g fill="none" stroke="url(#ic)" stroke-width="34" stroke-linecap="round" stroke-linejoin="round">
    <!-- chevron -->
    <polyline points="118,168 196,256 118,344"/>
    <!-- prompt underline / cursor -->
    <line x1="236" y1="352" x2="356" y2="352"/>
  </g>
  <!-- hash mark -->
  <g stroke="#e6edf3" stroke-width="26" stroke-linecap="round">
    <line x1="300" y1="150" x2="272" y2="286"/>
    <line x1="372" y1="150" x2="344" y2="286"/>
    <line x1="262" y1="192" x2="392" y2="192"/>
    <line x1="252" y1="244" x2="382" y2="244"/>
  </g>
</svg>
